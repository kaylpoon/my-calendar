<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Time Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 id="currentDateTime"></h1>
    <h3 id="localZone"></h3>
</header>

<main>
    <section id="eventsContainer"></section>

    <section id="timeZoneSection">

        <div class="tz-search-box">
            <div class="tz-header" onclick="toggleDropdown()">
                <span>Find a Time Zone</span>
                <span>▼</span>
            </div>

            <div id="dropdownContainer" class="hidden">
                <input type="text" id="tzSearch" placeholder="Search time zone..." onkeyup="filterZones()">
                <select id="tzSelect" size="8" onchange="displaySelectedZone()"></select>
            </div>

            <div id="selectedZoneDisplay"></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Time Zone</th>
                    <th>Current Time</th>
                    <th>Hour Difference</th>
                </tr>
            </thead>
            <tbody id="tzTableBody"></tbody>
        </table>

    </section>
</main>

<script src="script.js"></script>
</body>
</html>
